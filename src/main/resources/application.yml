# ──────────────────────────────────────────────────────────────────────────────
# Resilience4j Circuit Breaker Configuration
# Prevents cascade failures when external services (Ollama, etc.) go down.
# ──────────────────────────────────────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    configs:
      default:
        # Use a count-based sliding window of the last 10 calls
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        # Minimum calls before the circuit breaker can calculate the failure rate
        minimumNumberOfCalls: 5
        # If >= 50% of calls fail, open the circuit
        failureRateThreshold: 50
        # Wait 30 seconds in OPEN state before transitioning to HALF_OPEN
        waitDurationInOpenState: 30s
        # Allow 3 calls in HALF_OPEN to test if the downstream is back
        permittedNumberOfCallsInHalfOpenState: 3
        # Automatically transition from OPEN to HALF_OPEN
        automaticTransitionFromOpenToHalfOpenEnabled: true
        # Record these exceptions as failures
        recordExceptions:
          - java.io.IOException
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
          - com.karmika.hrms.exception.ServiceUnavailableException
        # Ignore these (they indicate client-side issues, not service failure)
        ignoreExceptions:
          - com.karmika.hrms.exception.BadRequestException
          - com.karmika.hrms.exception.ResourceNotFoundException
          - com.karmika.hrms.exception.UnauthorizedException
    instances:
      # Chatbot — calls external Ollama API
      ollamaService:
        baseConfig: default
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
      # General external service breaker (for future integrations)
      externalService:
        baseConfig: default
        slidingWindowSize: 10
        failureRateThreshold: 60
        waitDurationInOpenState: 60s
      # RandomUser API integration for Demo
      randomUserService:
        baseConfig: default
        slidingWindowSize: 4
        failureRateThreshold: 50
        waitDurationInOpenState: 20s

# Expose circuit breaker health in Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

