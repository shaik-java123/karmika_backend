spring:
  application:
    name: Karmika HRMS
  
  datasource:
    url: jdbc:mysql://localhost:3306/karmika_hrms?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata
    username: root
    password: moin
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    database-platform: org.hibernate.dialect.MySQLDialect
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# JWT Configuration
jwt:
  secret: karmika-hrms-secret-key-2026-change-this-in-production-with-strong-key
  expiration: 86400000  # 24 hours in milliseconds

# Application Configuration
app:
  name: Karmika HRMS
  version: 1.0.0
  timezone: Asia/Kolkata
  upload-dir: uploads

# SpringDoc OpenAPI (Swagger UI)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

# AI Chatbot — Ollama (local, no API key needed)
# Start Ollama: ollama serve
# Model must be pulled first: ollama pull tinyllama
ollama:
  base-url: http://localhost:11434
  model: tinyllama:1.1b
