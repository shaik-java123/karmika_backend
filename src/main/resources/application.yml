spring:
  application:
    name: Karmika HRMS
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/karmika_hrms?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&zeroDateTimeBehavior=convertToNull&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:moin}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    database-platform: org.hibernate.dialect.MySQLDialect


  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd

  
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:karmika-hrms-secret-key-2026-change-this-in-production-with-strong-key}
  expiration: 86400000  # 24 hours in milliseconds

# Application Configuration
app:
  name: Karmika HRMS
  version: 1.0.0
  timezone: Asia/Kolkata
  upload-dir: ${APP_UPLOAD_DIR:uploads}

# SpringDoc OpenAPI (Swagger UI)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

# AI Chatbot — Ollama (local, no API key needed)
# Start Ollama: ollama serve
# Model must be pulled first: ollama pull tinyllama
ollama:
  base-url: http://localhost:11434
  model: tinyllama:1.1b
